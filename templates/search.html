{% extends "base.html" %}
{% block content %}

<div class="card card-custom p-4">
    <h3>Search Incident to {{ operation|capitalize }}</h3>

    <form method="POST">
        <div class="mb-3">
            <label>Incident ID (e.g., INC-001)</label>
            <input type="text" name="iid" class="form-control" required>
        </div>

        <button class="btn btn-primary">Search</button>
    </form>
</div>

{% endblock %}
